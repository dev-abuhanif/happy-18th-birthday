<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Happy Birthday 🎂</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Pacifico&family=Great+Vibes&family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;600&display=block"
      rel="stylesheet"
    />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Nunito:wght@400;600&display=swap" rel="stylesheet">
    
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 72 72%22><text y=%22.9em%22 font-size=%2260%22>🎂</text></svg>"
    />

    <style>
      /* ========================================= */
      /* SITE 1 STYLES                 */
      /* ========================================= */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Poppins", sans-serif;
        background: #1a1a1a;
        color: #eaeaea;
        overflow-x: hidden;
        overflow-y: hidden;
        min-height: 100vh;
      }

      /* Preloader */
      .preloader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100vh;
        background: linear-gradient(135deg, #1a1a1a 0%, #2a2a2a 100%);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 99999;
        transition: opacity 0.8s, visibility 0.8s;
      }

      .preloader.loaded {
        opacity: 0;
        visibility: hidden;
      }

      .preloader-content {
        text-align: center;
        padding: 0 20px;
      }

      .preloader h2 {
        font-family: "Great Vibes", cursive;
        font-size: clamp(2.5rem, 8vw, 3.5rem);
        color: #ff4da6;
        margin-bottom: 30px;
        animation: pulse 1.5s ease-in-out infinite;
      }

      .loading-bar {
        width: min(300px, 80vw);
        height: 8px;
        background: rgba(255, 77, 166, 0.2);
        border-radius: 10px;
        overflow: hidden;
        margin: 20px auto;
      }

      .loading-progress {
        height: 100%;
        background: linear-gradient(90deg, #ff4da6, #ffd54f, #00e5ff);
        border-radius: 10px;
        width: 0%;
        transition: width 0.3s ease;
        animation: shimmer 2s ease-in-out infinite;
      }

      .loading-text {
        color: #00e5ff;
        font-size: 1.2rem;
        margin-top: 15px;
      }

      @keyframes shimmer {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.7; }
      }

      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(0.95); }
      }

      /* Card Section */
      .card-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100vh;
        background: linear-gradient(135deg, #1a1a1a 0%, #2a2a2a 100%);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 10000;
        transition: opacity 0.8s, visibility 0.8s;
        opacity: 0;
        visibility: hidden;
      }

      .card-overlay.visible {
        opacity: 1;
        visibility: visible;
      }

      .card-overlay.hidden {
        opacity: 0;
        visibility: hidden;
      }

      .birthday-card {
        width: min(420px, 90vw);
        height: min(550px, 80vh);
        position: relative;
        transform-style: preserve-3d;
        cursor: pointer;
        transition: transform 0.8s;
      }

      .birthday-card.opened {
        transform: rotateY(-180deg);
      }

      .card-front,
      .card-back {
        position: absolute;
        width: 100%;
        height: 100%;
        backface-visibility: hidden;
        border-radius: 20px;
        box-shadow: 0 25px 70px rgba(255, 77, 166, 0.3);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: clamp(20px, 5vw, 50px);
        border: 2px solid rgba(255, 77, 166, 0.3);
      }

      .card-front {
        background: linear-gradient(135deg, #ff4da6 0%, #ffd54f 100%);
      }

      .card-back {
        background: linear-gradient(135deg, #00e5ff 0%, #ff4da6 100%);
        transform: rotateY(180deg);
      }

      .envelope-icon {
        font-size: clamp(60px, 20vw, 100px);
        margin-bottom: 30px;
        animation: bounce 2s ease-in-out infinite;
        filter: drop-shadow(0 5px 10px rgba(0, 0, 0, 0.3));
      }

      @keyframes bounce {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-25px); }
      }

      .card-front h1 {
        font-family: "Great Vibes", cursive;
        font-size: clamp(36px, 10vw, 52px);
        color: #1a1a1a;
        margin-bottom: 20px;
      }

      .card-front p {
        font-size: clamp(16px, 5vw, 22px);
        color: #1a1a1a;
        text-align: center;
        font-weight: 300;
      }

      .card-back h2 {
        font-family: "Great Vibes", cursive;
        font-size: clamp(32px, 8vw, 48px);
        color: #ffffff;
        margin-bottom: 30px;
        text-align: center;
      }

      .card-back p {
        color: #ffffff;
        font-size: clamp(16px, 4vw, 20px);
        text-align: center;
        line-height: 1.6;
        margin-bottom: 30px;
      }

      .open-btn {
        padding: 15px 40px;
        font-size: clamp(16px, 4vw, 20px);
        font-family: "Poppins", sans-serif;
        font-weight: 600;
        background: #ffd54f;
        color: #1a1a1a;
        border: none;
        border-radius: 50px;
        cursor: pointer;
        box-shadow: 0 8px 20px rgba(255, 213, 79, 0.4);
        transition: all 0.3s;
      }

      .open-btn:hover {
        transform: translateY(-3px) scale(1.05);
        box-shadow: 0 12px 30px rgba(255, 213, 79, 0.6);
      }

      /* Final Section */
      .final-section {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        min-height: 100vh;
        background: linear-gradient(135deg, #1a0010 0%, #0a0a0a 100%);
        display: flex;
        justify-content: center;
        align-items: center;
        overflow-y: auto;
        overflow-x: hidden;
        z-index: 999;
        padding: 40px 20px;
      }

      .final-content-wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 2;
        width: 100%;
        padding: 20px;
      }

      .final-text {
        max-width: 900px;
        text-align: center;
        font-family: "Playfair Display", serif; 
        font-size: clamp(16px, 4vw, 28px); 
        line-height: 1.8;
        color: #ffffff;
        text-shadow: 0px 0px 10px rgba(255, 77, 166, 0.4); 
        margin-bottom: 17px; 
      }

      .letter {
        opacity: 0;
        display: inline-block;
        transform: translateY(20px);
      }

      .next-btn {
        padding: 12px 35px;
        font-size: 18px;
        font-family: "Poppins", sans-serif;
        background: transparent;
        color: #ffffff;
        border: 2px solid #ff4da6;
        border-radius: 30px;
        cursor: pointer;
        transition: all 0.5s ease;
        opacity: 0;
        transform: translateY(20px);
      }

      .next-btn.visible {
        opacity: 1;
        transform: translateY(0);
      }

      .next-btn:hover {
        background: #ff4da6;
        box-shadow: 0 0 15px rgba(255, 77, 166, 0.6);
        transform: translateY(-3px);
      }

      .bg-animation {
        position: fixed; 
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: radial-gradient(circle at 50% 50%, rgba(255, 77, 166, 0.25), transparent 60%);
        animation: pulse-glow 4s ease-in-out infinite alternate;
        z-index: 1;
        pointer-events: none;
      }

      @keyframes pulse-glow {
        0% { transform: scale(1); opacity: 0.6; }
        100% { transform: scale(1.3); opacity: 1; }
      }

      .particle {
        position: fixed;   
        bottom: -50px;     
        font-size: clamp(18px, 5vw, 24px); 
        pointer-events: none;
        animation: floatUp linear forwards; 
        z-index: 9999;     
      }

      @keyframes floatUp {
        0% {
          transform: translateY(0) rotate(0deg);
          opacity: 0;
        }
        10% {
          opacity: 1;
        }
        100% {
          transform: translateY(-110vh) rotate(360deg);
          opacity: 0;
        }
      }

      /* ========================================= */
      /* SITE 2 STYLES                 */
      /* ========================================= */
      
      #sectionTwo {
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        background-color: #ffffff;
        font-family: 'Nunito', sans-serif;
        position: relative;
        justify-content: center;
        align-items: center;
      }

      #balloon-container {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 10;
        pointer-events: none;
        transition: opacity 1s ease;
      }

      .balloon {
        position: absolute;
        bottom: -150px;
        width: 80px;
        height: 95px;
        border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
        animation: floatUpSite2 linear forwards;
      }

      .balloon::before {
        content: "";
        position: absolute;
        bottom: -8px;
        left: 50%;
        transform: translateX(-50%);
        width: 0;
        height: 0;
        border-left: 6px solid transparent;
        border-right: 6px solid transparent;
        border-bottom: 10px solid inherit;
      }

      .balloon::after {
        content: "";
        position: absolute;
        bottom: -80px;
        left: 50%;
        transform: translateX(-50%);
        width: 2px;
        height: 80px;
        background-color: #cccccc;
        z-index: -1;
      }

      @keyframes floatUpSite2 {
        0% { transform: translateY(0) rotate(0deg); opacity: 1; }
        100% { transform: translateY(-120vh) rotate(5deg); opacity: 1; }
      }

      #main-content {
        text-align: center;
        z-index: 20;
        display: flex;
        flex-direction: column;
        align-items: center;
        transform: translateY(-100vh);
        opacity: 0;
        transition: transform 1.2s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.8s ease;
      }

      #main-content.visible {
        transform: translateY(0);
        opacity: 1;
      }

      #profile-img {
        width: 350px;
        height: 500px;
        object-fit: cover;
        border-radius: 12px;
        box-shadow: 0 15px 35px rgba(0,0,0,0.15);
        margin-bottom: 25px;
      }

      #bday-text {
        font-family: 'Montserrat', sans-serif;
        font-size: 2.2rem;
        letter-spacing: 4px;
        color: #111;
        margin-bottom: 15px;
      }

      #subtitle {
        font-size: 1.1rem;
        color: #555;
      }

      #bg-circles {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1;
        pointer-events: none;
        overflow: hidden;
        transition: opacity 1s ease;
      }

      .bg-circle {
        position: absolute;
        border-radius: 50%;
        opacity: 0;
        transform: scale(0);
        animation: pulseCircle 8s infinite alternate ease-in-out;
      }

      @keyframes pulseCircle {
        0% { opacity: 0; transform: scale(0.5) translate(0, 0); }
        50% { opacity: 0.6; }
        100% { opacity: 0; transform: scale(1.5) translate(20px, -20px); }
      }

      #confetti-canvas {
        position: fixed;
        top: 0;
        left: 0;
        z-index: 9999;
        pointer-events: none;
      }

      #confetti-canvas.visible {
        opacity: 1;
      }

      #outro {
        position: absolute;
        z-index: 30;
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        opacity: 0;
        transition: opacity 1s ease;
        background: rgba(255, 255, 255, 0.9);
      }

      #outro.visible {
        opacity: 1;
      }

      .outro-box {
        background: white;
        padding: 50px 60px;
        border-radius: 20px;
        box-shadow: 0 20px 50px rgba(0,0,0,0.1);
        border: 1px solid #eee;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        transform: scale(0.9);
        transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      }

      #outro.visible .outro-box {
        transform: scale(1);
      }

      .outro-text { 
        font-size: 1.5rem; 
        color: #333; 
        font-weight: 600;
      }

      .outro-link { 
        background-color: #52D1C5;
        color: white;
        border: none;
        padding: 15px 30px;
        font-size: 1rem;
        font-weight: bold;
        border-radius: 50px;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 4px 15px rgba(82, 209, 197, 0.4);
      }

      .outro-link:hover { 
        background-color: #3ebfb3;
        transform: translateY(-3px);
        box-shadow: 0 6px 20px rgba(82, 209, 197, 0.6);
      }

      .outro-smiley { 
        font-size: 1.5rem; 
        color: #888; 
        transform: rotate(90deg); 
      }

      .hidden { display: none !important; }

      img {
        max-width: 100%;
        height: auto;
        display: block;
        margin: 0 auto;
      }

      @media screen and (max-width: 768px) {
        #main-content, #outro {
          width: 90%;          
          left: 5%;            
          padding: 10px;
        }
        h1 {
          font-size: 1.8rem !important; 
        }
        p {
          font-size: 1rem !important;
        }
        .balloon {
          transform: scale(0.8);
        }
      }

      #confetti-canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: 9999;
        pointer-events: none;
      }
    </style>
  </head>
  <body>

    <audio id="birthdayMusic" src="audio/birthday-song.mp3" preload="auto" loop></audio>
    
    <div class="preloader" id="preloader">
      <div class="preloader-content">
        <h2>Preparing Something Special...</h2>
        <div class="loading-bar">
          <div class="loading-progress" id="loadingProgress"></div>
        </div>
        <p class="loading-text" id="loadingText">Loading... 0%</p>
      </div>
    </div>

    <div class="card-overlay" id="cardOverlay">
      <div class="birthday-card" id="birthdayCard">
        <div class="card-front">
          <div class="envelope-icon">💌</div>
          <h1>For You</h1>
          <p>Click to open your surprise...</p>
        </div>
        <div class="card-back">
          <h2>Happy 18th Birthday! <br />🎉🎉🎉</h2>
          <p>
            Hey, I have created something special for you...<br />
            I hope you like it! ✨
          </p>
          <button class="open-btn" id="openBtn">Start! 🎈</button>
        </div>
      </div>
    </div>

    <div class="final-section" id="finalSection" style="display:none;">
      <div class="bg-animation"></div>
      
      <div class="final-content-wrapper">
        <div class="final-text" id="finalText"></div>
        <button class="next-btn" id="nextBtn" style="display: none;">Next ➜</button>
      </div>
    </div>

    <div id="sectionTwo" style="display:none; z-index:2000;">
      <div id="bg-circles"></div>
      <canvas id="confetti-canvas"></canvas>
      <div id="balloon-container"></div>

      <div id="main-content" class="hidden">
          <img id="profile-img" src="image/kusum.jpg"> 
          <h1 id="bday-text">HAPPY BIRTHDAY!</h1>
      </div>

      <div id="outro" class="hidden">
          <div class="outro-box">
              <p class="outro-text">Hope you liked it!</p>
              <button class="outro-link" onclick="location.reload()">Click here to watch again!</button>
              <p class="outro-smiley">:)</p>
          </div>
      </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.5/gsap.min.js"></script>
    
    <script>
      let particleInterval; 
      const bdayMusic = document.getElementById("birthdayMusic");
      
      // Asset Preloader
      let loadedAssets = 0;
      const totalAssets = 1; 
      const minLoadingTime = 3500; 
      const startTime = Date.now();

      function updateProgress() {
        loadedAssets++;
        const progress = (loadedAssets / totalAssets) * 100;
        document.getElementById("loadingProgress").style.width = progress + "%";
        document.getElementById("loadingText").textContent = `Loading... ${Math.round(progress)}%`;

        if (loadedAssets === totalAssets) {
          const currentTime = Date.now();
          const elapsedTime = currentTime - startTime;
          const remainingTime = Math.max(0, minLoadingTime - elapsedTime);

          setTimeout(() => {
            document.getElementById("preloader").classList.add("loaded");
            document.getElementById("cardOverlay").classList.add("visible");
          }, remainingTime);
        }
      }

      const img = new Image();
      img.onload = updateProgress;
      img.onerror = updateProgress;
      img.src = "image/kusum.jpg"; 

      const card = document.getElementById("birthdayCard");
      const cardOverlay = document.getElementById("cardOverlay");
      const openBtn = document.getElementById("openBtn");

      card.addEventListener("click", function () {
        if (!card.classList.contains("opened")) {
          card.classList.add("opened");
        }
      });

      function startFinalMessage() {
        const section = document.getElementById("finalSection");
        const container = document.getElementById("finalText");
        const nextBtn = document.getElementById("nextBtn");

        section.style.display = "flex"; 
        container.innerHTML = "";
        
        nextBtn.style.display = "block";
        nextBtn.style.visibility = "hidden"; 
        nextBtn.classList.remove("visible");

        startParticles();

        const lines = [
          "Happy 18th Birthday, Kusum ✨",
          "Today isn’t just about turning eighteen — it’s about stepping into your own power.",
          "You’re not just growing older, you’re growing stronger, wiser, and more beautiful.",
          "You’re becoming someone truly remarkable.",
          "I hope this year gives you fearless dreams, genuine happiness,",
          "and memories that stay with you forever.",
          "I’m truly grateful I get to walk through this life as your friend."
        ];

        let totalDelay = 0;

        lines.forEach((line) => {
          const lineDiv = document.createElement("div");
          lineDiv.style.marginBottom = "15px"; 
          
          const words = line.split(" ");
          
          words.forEach((word, wordIndex) => {
            const wordSpan = document.createElement("span");
            wordSpan.style.display = "inline-block";
            
            const chars = word.split("");
            
            chars.forEach((char) => {
              const span = document.createElement("span");
              span.className = "letter";
              span.innerHTML = char;
              
              span.style.transition = "all 0.8s cubic-bezier(0.22, 1, 0.36, 1)";
              span.style.filter = "blur(10px)";
              span.style.opacity = "0";
              span.style.transform = "scale(1.2) translateY(10px)";
              
              wordSpan.appendChild(span);

              setTimeout(() => {
                span.style.opacity = 1;
                span.style.filter = "blur(0px)";
                span.style.transform = "scale(1) translateY(0)";
              }, totalDelay);

              totalDelay += 45; 
            });
            
            lineDiv.appendChild(wordSpan);
            
            if (wordIndex < words.length - 1) {
              const spaceSpan = document.createElement("span");
              spaceSpan.innerHTML = "&nbsp;";
              lineDiv.appendChild(spaceSpan);
            }
          });
          
          container.appendChild(lineDiv);
          totalDelay += 600; 
        });

        setTimeout(() => {
          nextBtn.style.visibility = "visible";
          nextBtn.classList.add("visible");
        }, totalDelay);
      }

      function startParticles() {
        const emojis = ["🎈", "✨", "🎉", "🎂", "🌟", "💖"];
        particleInterval = setInterval(() => {
          const particle = document.createElement("div");
          particle.className = "particle";
          particle.textContent = emojis[Math.floor(Math.random() * emojis.length)];
          particle.style.left = Math.random() * 100 + "%";
          particle.style.animationDuration = 5 + Math.random() * 5 + "s";
          document.body.appendChild(particle);
          setTimeout(() => particle.remove(), 10000);
        }, 400);
      }

      // START BUTTON LOGIC (MUSIC STARTS HERE)
      openBtn.addEventListener("click", function (e) {
        e.stopPropagation();
        
        // Start Music
        bdayMusic.play().catch(error => {
            console.log("Browser blocked autoplay. Music will start on user interaction.");
        });

        cardOverlay.classList.add("hidden");
        setTimeout(() => startFinalMessage(), 800);
      });

      // NEXT BUTTON LOGIC
      document.getElementById('nextBtn').addEventListener('click', () => {
          if (particleInterval) {
              clearInterval(particleInterval);
          }
          document.querySelectorAll('.particle').forEach(p => p.remove());
          document.getElementById('finalSection').style.display = 'none';
          const sectionTwo = document.getElementById('sectionTwo');
          sectionTwo.style.display = 'flex';
          startSectionTwo();
      });

      // SECTION 2 LOGIC
      function startSectionTwo() {
          const balloonContainer = document.getElementById("balloon-container");
          const mainContent = document.getElementById("main-content");
          const canvas = document.getElementById("confetti-canvas");
          const bgCircles = document.getElementById("bg-circles");
          const outro = document.getElementById("outro");
          const colors = ['#F96D6D', '#52D1C5', '#FDF1B0', '#A7D7B5', '#D2B4DE'];

          createBalloons(25);

          setTimeout(() => {
              balloonContainer.style.opacity = 0; 
              mainContent.classList.remove("hidden");
              setTimeout(() => {
                  mainContent.classList.add("visible");
                  createBgCircles();
                  startConfetti();
              }, 50);
          }, 7000); 

          setTimeout(() => {
              mainContent.style.opacity = 0;
              canvas.style.opacity = 0;
              bgCircles.style.opacity = 0;
              
              // ADDED THIS TO PAUSE MUSIC WHEN OUTRO APPEARS
              setTimeout(() => {
                  bdayMusic.pause();
                  outro.classList.remove("hidden");
                  setTimeout(() => outro.classList.add("visible"), 100);
              }, 1000);
          }, 27000); 

          function createBalloons(count) {
              for (let i = 0; i < count; i++) {
                  let balloon = document.createElement("div");
                  balloon.classList.add("balloon");
                  balloon.style.left = `${Math.random() * 90 + 5}%`; 
                  let randomColor = colors[Math.floor(Math.random() * colors.length)];
                  balloon.style.backgroundColor = randomColor;
                  balloon.style.borderBottomColor = randomColor; 
                  balloon.style.animationDelay = `${Math.random() * 3}s`;
                  balloon.style.animationDuration = `${Math.random() * 2 + 4.5}s`; 
                  balloonContainer.appendChild(balloon);
              }
          }

          function createBgCircles() {
              for(let i = 0; i < 15; i++) {
                  let circle = document.createElement("div");
                  circle.classList.add("bg-circle");
                  let size = Math.random() * 200 + 50;
                  circle.style.width = `${size}px`;
                  circle.style.height = `${size}px`;
                  circle.style.left = `${Math.random() * 100}vw`;
                  circle.style.top = `${Math.random() * 100}vh`;
                  circle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                  circle.style.animationDelay = `${Math.random() * 5}s`;
                  circle.style.animationDuration = `${Math.random() * 4 + 4}s`;
                  bgCircles.appendChild(circle);
              }
          }

          function startConfetti() {
              canvas.classList.add("visible");
              const ctx = canvas.getContext("2d");
              canvas.width = window.innerWidth;
              canvas.height = window.innerHeight;
              const particles = [];
              const particleCount = 150;
              for (let i = 0; i < particleCount; i++) {
                  particles.push({
                      x: Math.random() * canvas.width,
                      y: Math.random() * canvas.height - canvas.height,
                      r: Math.random() * 6 + 2,
                      dx: Math.random() * 2 - 1,
                      dy: Math.random() * 3 + 2,
                      color: colors[Math.floor(Math.random() * colors.length)],
                      tilt: Math.random() * 10,
                      tiltAngle: 0,
                      tiltAngleInc: (Math.random() * 0.07) + 0.05
                  });
              }
              function render() {
                  requestAnimationFrame(render);
                  ctx.clearRect(0, 0, canvas.width, canvas.height);
                  particles.forEach((p) => {
                      p.tiltAngle += p.tiltAngleInc;
                      p.y += p.dy;
                      p.x += p.dx; 
                      ctx.beginPath();
                      ctx.lineWidth = p.r;
                      ctx.strokeStyle = p.color;
                      ctx.moveTo(p.x + p.tilt + p.r, p.y);
                      ctx.lineTo(p.x + p.tilt, p.y + p.tilt + p.r);
                      ctx.stroke();
                      if (p.y > canvas.height) {
                          p.x = Math.random() * canvas.width;
                          p.y = -20;
                          p.tilt = Math.random() * 10;
                      }
                  });
              }
              render();
              window.addEventListener('resize', () => {
                  canvas.width = window.innerWidth;
                  canvas.height = window.innerHeight;
              });
          }
      }
    </script>
  </body>
</html>
